<!DOCTYPE html>

    <div class="metric-card">
      <h3>Total Jobs</h3>
      <p id="totalJobs">0</p>
    </div>

    <div class="metric-card">
      <h3>Running</h3>
      <p id="runningJobs">0</p>
    </div>

    <div class="metric-card">
      <h3>Queued</h3>
      <p id="queuedJobs">0</p>
    </div>

    <div class="metric-card">
      <h3>Failed</h3>
      <p id="failedJobs">0</p>
    </div>

  </section>

  <!-- MAIN BOARD -->
  <section class="board">

    <div class="column">
      <div class="column-header queued-header">
        QUEUED
      </div>

      <div id="queuedColumn" class="job-list"></div>
    </div>

    <div class="column">
      <div class="column-header waiting-header">
        WAITING
      </div>

      <div id="waitingColumn" class="job-list"></div>
    </div>

    <div class="column">
      <div class="column-header running-header">
        RUNNING
      </div>

      <div id="runningColumn" class="job-list"></div>
    </div>

    <div class="column">
      <div class="column-header completed-header">
        COMPLETED
      </div>

      <div id="completedColumn" class="job-list"></div>
    </div>

    <div class="column">
      <div class="column-header failed-header">
        FAILED
      </div>

      <div id="failedColumn" class="job-list"></div>
    </div>

  </section>

  <script src="/js/dashboard.js"></script>

</body>
</html>
